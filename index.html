<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 양심우산 대여</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-messaging.js"></script>

    <style>
        body {
            margin: 0; padding: 0; background-color: #cccccc;
            font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .container {
            width: 90%; max-width: 440px; background-color: #ffffff;
            border-radius: 40px; padding: 40px 30px; box-sizing: border-box;
            display: flex; flex-direction: column; align-items: center;
            min-height: 380px; justify-content: center;
        }
        .title { font-size: 16px; color: #666666; margin-bottom: 5px; font-weight: bold; letter-spacing: -0.5px; }
        .umbrella-info { font-size: 11px; color: #0000ff; margin-bottom: 25px; text-align: center; }
        form { width: 100%; }
        .input-group { display: flex; align-items: center; margin-bottom: 25px; width: 100%; }
        .input-group label { font-size: 24px; font-weight: bold; color: #000000; width: 80px; flex-shrink: 0; text-align: left; }
        .input-group input { flex-grow: 1; height: 42px; border: 1px solid #7a7a7a; border-radius: 8px; padding: 0 15px; font-size: 18px; color: #000000; outline: none; box-sizing: border-box; }
        .input-group input::placeholder { color: #333333; font-size: 18px; }
        .submit-btn, .return-btn { width: 100%; height: 46px; border: none; border-radius: 5px; font-size: 18px; font-weight: bold; color: #000000; cursor: pointer; transition: background-color 0.2s ease; }
        .submit-btn { background-color: #cccccc; margin-top: 15px; }
        .submit-btn:active { background-color: #b5b5b5; }
        #return-container { width: 100%; display: flex; justify-content: center; align-items: center; margin-top: 20px; }
        .return-btn { background-color: #cccccc; padding: 10px 20px; width: auto; height: auto; border-radius: 5px; font-size: 24px; letter-spacing: -0.5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .return-btn:active { background-color: #b5b5b5; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="container">
        <div class="title">양심우산 대여 시스템</div>
        <div class="umbrella-info" id="umbrella-title">우산 정보를 불러오는 중...</div>

        <form id="rent-form" class="hidden">
            <div class="input-group">
                <label for="studentId">학번 :</label>
                <input type="text" id="studentId" placeholder="예: 20502" required autocomplete="off">
            </div>
            <div class="input-group">
                <label for="studentName">이름 :</label>
                <input type="text" id="studentName" placeholder="예: 김희정" required autocomplete="off">
            </div>
            <button type="submit" class="submit-btn">우산 대여하기(잠금 해제)</button>
        </form>

        <div id="return-container" class="hidden">
            <button id="return-btn" class="return-btn">우산 반납하기(잠금)</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "umbrella-e6536.firebaseapp.com",
            databaseURL: "https://umbrella-e6536-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "umbrella-e6536",
            storageBucket: "umbrella-e6536.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        let messaging;
        try { messaging = firebase.messaging(); } catch(e) { console.log(e); }

        const urlParams = new URLSearchParams(window.location.search);
        const umbrellaId = urlParams.get('id') || 'umbrella_01';
        document.getElementById('umbrella-title').innerText = `현재 선택된 우산: ${umbrellaId}`;

        const umbrellaRef = database.ref('umbrellas/' + umbrellaId);
        const rentForm = document.getElementById('rent-form');
        const returnContainer = document.getElementById('return-container');
        let deviceToken = "";

        // FCM 웹 푸시 토큰 생성 및 권한 요청
        if (messaging) {
            messaging.requestPermission()
                .then(() => messaging.getToken({ vapidKey: "YOUR_FIREBASE_PUBLIC_VAPID_KEY" }))
                .then((token) => { deviceToken = token; })
                .catch((err) => console.log("알림 권한 거부:", err));
        }

        umbrellaRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) return;
            if (data.status === 'rented') {
                rentForm.classList.add('hidden');
                returnContainer.classList.remove('hidden');
            } else {
                rentForm.classList.remove('hidden');
                returnContainer.classList.add('hidden');
            }
        });

        rentForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const id = document.getElementById('studentId').value.trim();
            const name = document.getElementById('studentName').value.trim();

            if (!/^\d{5}$/.test(id)) { alert("❌ 학번은 숫자 5자리여야 합니다."); return; }
            if (!/^[가-힣]+$/.test(name)) { alert("❌ 이름은 한글이어야 합니다."); return; }

            umbrellaRef.transaction((currentData) => {
                if (currentData === null) return currentData;
                if (currentData.status === 'rented') return;
                currentData.status = "rented";
                currentData.student_id = id;
                currentData.student_name = name;
                currentData.rented_at = new Date().toLocaleString();
                currentData.student_token = deviceToken; // 기기 토큰 저장
                return currentData;
            }, (error, committed) => {
                if (error) alert("오류: " + error.message);
                else if (!committed) alert("⚠️ 현재 대여 중인 우산입니다!");
                else {
                    alert(`${umbrellaId} 대여 신청 완료!`);
                    document.getElementById('studentId').value = '';
                    document.getElementById('studentName').value = '';
                }
            });
        });

        document.getElementById('return-btn').addEventListener('click', function() {
            if (confirm(`${umbrellaId} 우산을 반납하시겠습니까?`)) {
                umbrellaRef.update({
                    status: "available", student_id: "", student_name: "", rented_at: "", student_token: ""
                }).then(() => alert("반납 완료되었습니다."));
            }
        });
    </script>
</body>
</html>
