<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>우산 대여 관리자 페이지</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background-color: #f2f2f2; }
        .available { color: green; font-weight: bold; }
        .rented { color: red; font-weight: bold; }
        button { padding: 6px 12px; cursor: pointer; margin: 2px; }
        .push-btn { background-color: #ff9800; color: white; border: none; border-radius: 4px; }
        .push-btn:disabled { background-color: #ccc; }
    </style>
</head>
<body>
    <h2>📋 스마트 우산 대여 현황 (관리자 페이지)</h2>
    <table>
        <thead>
            <tr>
                <th>우산 ID</th>
                <th>상태</th>
                <th>학번</th>
                <th>이름</th>
                <th>대여 시간</th>
                <th>조작</th>
            </tr>
        </thead>
        <tbody id="umbrella-list"></tbody>
    </table>

    <script>
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY", // ◀ 여기에 들어가는 API Key가 중요합니다.
            authDomain: "umbrella-e6536.firebaseapp.com",
            databaseURL: "https://umbrella-e6536-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "umbrella-e6536"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        database.ref('umbrellas').on('value', (snapshot) => {
            const data = snapshot.val();
            const tbody = document.getElementById('umbrella-list');
            tbody.innerHTML = ''; 

            for (let id in data) {
                const item = data[id];
                const statusText = item.status === 'rented' ? '대여중' : '대여가능';
                const statusClass = item.status === 'rented' ? 'rented' : 'available';
                const isRented = item.status === 'rented';

                const row = `
                    <tr>
                        <td>${id}</td>
                        <td class="${statusClass}">${statusText}</td>
                        <td>${item.student_id || '-'}</td>
                        <td>${item.student_name || '-'}</td>
                        <td>${item.rented_at || '-'}</td>
                        <td>
                            <button onclick="returnUmbrella('${id}')" ${!isRented ? 'disabled' : ''}>반납 완료</button>
                            <button class="push-btn" onclick="sendWebPush('${id}', '${item.student_token}', '${item.student_name}')" ${!isRented || !item.student_token ? 'disabled' : ''}>🚨 반납 독촉</button>
                        </td>
                    </tr>
                `;
                tbody.innerHTML += row;
            }
        });

        // 반납 처리
        function returnUmbrella(id) {
            if(confirm(`${id} 우산을 반납 처리하시겠습니까?`)) {
                database.ref('umbrellas/' + id).update({
                    status: "available",
                    student_id: "",
                    student_name: "",
                    rented_at: "",
                    student_token: ""
                }).then(() => alert("반납 완료"));
            }
        }

        // 🔍 [정석 웹 푸시 전송 기능] 구글 FCM 서버로 메시지 요청 쏘기
        function sendWebPush(umbrellaId, token, studentName) {
            if (!token || token === 'undefined') {
                alert("해당 기기의 알림 토큰 주소가 없습니다.");
                return;
            }

            // 구글 FCM 서버 주소 (레거시 방식 HTTP 프로토콜)
            const fcmServerUrl = "https://fcm.googleapis.com/fcm/send";
            
            // ⚠️ 해커톤 꿀팁: Firebase Console -> 프로젝트 설정 -> 클라우드 메시징 메뉴에 있는 
            // '서버 키(Server Key)'를 'key=' 뒤에 정확히 넣어야 권한 인증이 됩니다.
            const serverKey = "YOUR_FIREBASE_SERVER_KEY"; 

            const messageBody = {
                to: token,
                notification: {
                    title: "☂️ [양심우산 반납 요청]",
                    body: `${studentName}님, 대여하신 ${umbrellaId} 청소 시간 마감 전까지 대여함으로 반납 부탁드립니다!`,
                    click_action: "https://cennode.github.io/umbrella/"
                }
            };

            fetch(fcmServerUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'key=' + serverKey
                },
                body: JSON.stringify(messageBody)
            })
            .then(res => {
                alert(`${studentName} 학생 스마트폰 브라우저로 실시간 웹 푸시 알림을 발송했습니다!`);
            })
            .catch(err => {
                alert("푸시 발송 실패: " + err.message);
            });
        }
    </script>
</body>
</html>
